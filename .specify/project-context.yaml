product:
  name: "CC Plugin Market"
  summary: "Reverse Spec 与 Spec Driver 的共享研发仓库，重点维护 panoramic 文档链路和自治研发编排能力。"

owner:
  name: "Connor Lu"

references:
  - label: "Repository Rules"
    path: "AGENTS.md"
    required: true
    purpose: "仓库级执行、目录与分支规则"
  - label: "Claude Runtime Rules"
    path: "CLAUDE.md"
    required: false
    purpose: "Claude 运行时差异与共享上下文规则"
  - label: "Spec Driver Current Spec"
    path: "specs/products/spec-driver/current-spec.md"
    required: true
    purpose: "Spec Driver 产品事实源"
  - label: "Reverse Spec Current Spec"
    path: "specs/products/reverse-spec/current-spec.md"
    required: false
    purpose: "Reverse Spec 产品事实源"

architecture_constraints:
  - "优先修改 plugins/** 与 src/** 下的源码，不直接手改 .codex/** 与 .claude/** 包装产物。"
  - "产品级机器生成产物保持写入 specs/products/**/_generated 与 specs/products/_generated。"

verification_policy:
  require_real_execution: true
  required_commands:
    - "npm run lint"
    - "npm run build"
  notes:
    - "改动 spec-driver 或 panoramic 合同时，优先补充对应集成测试。"

research_policy:
  online_required: false
  min_points: 0
  max_points: 3
  preferred_tools: []
  notes:
    - "仅在外部最佳实践或最新规范会影响设计时再做在线调研。"

workflow_preferences:
  default_mode: "feature"
  preferred_preset: "quality-first"
  notes:
    - "当 spec.md 和 plan.md 已成熟时，优先使用 spec-driver-implement。"

forbidden_changes:
  - "避免直接修改 .codex/skills/**；应通过 install 脚本重新生成包装。"
  - "避免把 Spec 级执行策略写进 Project Context；这类语义应进入 feature 制品或 spec-driver-implement。"

notes:
  - "Project Context 只承载项目级长期偏好、约束与参考资料。"
