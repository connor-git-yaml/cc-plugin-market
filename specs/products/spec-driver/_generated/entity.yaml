description: "Spec Driver v4.2.2（Feature 207 修复）— init-project.sh / postinstall.sh 落盘脚手架与机器态文件（`.specify/templates` `.specify/scorecards` `.specify/runs` `.specify/.spec-driver-path`）新增自举式 ignore 注入（共享库 `lib/ensure-gitignore.sh`）：主防线写 `.git/info/exclude`（Git 原生非 tracked 项目级 ignore，零 diff 污染），兜底防线写 `.gitignore`（团队共享配置，覆盖 worktree/非 git 场景）；幂等 + symlink/NUL/negation 防御 + 反 ABA 并发（不 stale 抢占）+ 静默容错。postinstall（SessionStart hook）只写 exclude 不改用户 tracked 的 .gitignore。修复第三方 repo 首次使用时脚手架与本机绝对路径污染 git diff / 交付 patch 的问题（SWE-bench 评测中 85 个 c3 run 100% 命中）。v4.2.1（F176 SWE-Bench 实测修复）— fix skill 新增「委派硬约束」堵编排器 inline 化（实测：模型自判'影响范围小'会跳过 Phase 2/3/4 的 Task 委派，导致子代理的 spectra MCP 集成链整体失效）+ fix skill 编排器 model sonnet→opus（实测 sonnet 无视 MUST 委派指令，opus 服从——委派契约成立前提，与模型选择策略文档对齐）。v4.2.0（Feature 170a）— 修复 5 个 sub-agent frontmatter namespace mismatch（mcp__spectra__* → mcp__plugin_spectra_spectra__*），确保 Claude Code plugin 环境下 sub-agent 2 步开箱即用调到 spectra MCP 工具。新增 spectra-mcp-integration.md + customization.md 部署指引。v4.1.0 — Feature 162 Phase 0：5 个核心 sub-agent (plan / implement / verify / quality-review / spec-review) frontmatter 首次追加 spectra MCP 工具声明。v4.0.0 — 删除 9 个遗留原子 skill（统一编排器入口）+ Feature 133 项目级 orchestration overrides。八种模式 / 6 个质量门禁 / sync-merge-engine 确定性合并 / 15 个专业子代理"
