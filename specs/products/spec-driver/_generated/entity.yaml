description: "Spec Driver v4.3.0（Feature 208）— fix 模式流程依从性结构化保障（防仪式坍塌）：F206 实测 20%-29% 的 fix 会话整体遗弃 SKILL 流程（0 委派、无制品、行内 cosplay 收口），三轮 prompt 级守卫全部被绕——新增阻断型 Stop hook（stop-fix-compliance-check.sh → fix-compliance-judge.mjs），在会话收口时机械判定合规性（判据全部来自 harness 客观记录：transcript 技能展开痕迹锚定判定窗口 + Agent/Task tool_use 委派计数与角色级联分类 + 磁盘制品实质性校验，模型自陈零采信、tool_result 伪造锚点免疫）；按收口形态三支最低门槛（修复收口=fix-report+verification-report+implement/verify 委派各≥1；no-op 收口=「## 判定依据」章节+≥1 次核实类委派；零委派零制品一律不合规）；「确认无需改动」成为 fix SKILL Phase 1 一等公民出口；阻断有界（同会话至多 2 次，第 3 次 [GATE-DEGRADED] 降级放行 + workflow-run-summary 终态双写幂等）；项目级 fix_compliance.enforcement 配置（block 默认/warn/off，缺失或非法回落 block，判定异常 fail-open-but-loud）；判定路径零 LLM 零委派，实测 p95 26ms（0.24MB 真实 transcript）/ 42ms（7.6MB 最坏样本）。record-workflow-run.mjs 向后兼容升级（complianceVerdict 可选字段，未传参字节级不变）。v4.2.2（Feature 207 修复）— init-project.sh / postinstall.sh 落盘脚手架与机器态文件（`.specify/templates` `.specify/scorecards` `.specify/runs` `.specify/.spec-driver-path`）新增自举式 ignore 注入（共享库 `lib/ensure-gitignore.sh`）：主防线写 `.git/info/exclude`（Git 原生非 tracked 项目级 ignore，零 diff 污染），兜底防线写 `.gitignore`（团队共享配置，覆盖 worktree/非 git 场景）；幂等 + symlink/NUL/negation 防御 + 反 ABA 并发（不 stale 抢占）+ 静默容错。postinstall（SessionStart hook）只写 exclude 不改用户 tracked 的 .gitignore。修复第三方 repo 首次使用时脚手架与本机绝对路径污染 git diff / 交付 patch 的问题（SWE-bench 评测中 85 个 c3 run 100% 命中）。v4.2.1（F176 SWE-Bench 实测修复）— fix skill 新增「委派硬约束」堵编排器 inline 化（实测：模型自判'影响范围小'会跳过 Phase 2/3/4 的 Task 委派，导致子代理的 spectra MCP 集成链整体失效）+ fix skill 编排器 model sonnet→opus（实测 sonnet 无视 MUST 委派指令，opus 服从——委派契约成立前提，与模型选择策略文档对齐）。v4.2.0（Feature 170a）— 修复 5 个 sub-agent frontmatter namespace mismatch（mcp__spectra__* → mcp__plugin_spectra_spectra__*），确保 Claude Code plugin 环境下 sub-agent 2 步开箱即用调到 spectra MCP 工具。新增 spectra-mcp-integration.md + customization.md 部署指引。v4.1.0 — Feature 162 Phase 0：5 个核心 sub-agent (plan / implement / verify / quality-review / spec-review) frontmatter 首次追加 spectra MCP 工具声明。v4.0.0 — 删除 9 个遗留原子 skill（统一编排器入口）+ Feature 133 项目级 orchestration overrides。八种模式 / 6 个质量门禁 / sync-merge-engine 确定性合并 / 15 个专业子代理"
