  spec-driver:
    description: "Spec Driver v3.1.0 — 自治研发编排器 Plugin，支持 feature/story/fix/resume/sync/doc 六种模式，并以 product current-spec 作为文档事实源"
    specs:
      - id: "011-speckit-driver-pro"
        type: INITIAL
        summary: "完整自治编排器：10 阶段工作流、质量门、resume/rerun 机制、story/fix 快速模式"
      - id: "012-product-spec-sync"
