        summary: "产品规范聚合（sync）：增量 spec 智能合并为产品级活文档"
      - id: "013-split-skill-commands"
        type: REFACTOR
        summary: "拆分单体技能为 feature/resume/sync 等独立命令，优化上下文预算"
      - id: "014-rename-spec-driver"
        type: REFACTOR
        summary: "重命名 speckitdriver → spec-driver，统一 spec-driver-* 前缀"
      - id: "015-speckit-doc-command"
        type: FEATURE
        summary: "新增 spec-driver-doc 命令，一键生成 README 等开源文档"
