# Speckit Driver Pro - 驱动配置文件
# 预设: balanced（默认 Sonnet 4.6，Phase 2 / Fix 134 新默认；与源码 PRESET_MODEL_MAP.balanced='sonnet' 对齐）

preset: balanced

# ═══════════════════════════════════════
# Spectra batch 并发配置（Feature 146）
# ═══════════════════════════════════════
# Spectra batch 的并发处理参数。
# 优先级：CLI flag --concurrency=N > 此处 batch.concurrency > 代码默认值 3
# GATE_DESIGN 决议 C-001：配置位置确认为 spec-driver.config.yaml
batch:
  concurrency: 3  # 并发处理模块数上限（1=顺序，建议 3-5；超出 5 在 Anthropic 免费/低配额下易触发 429）

agents:
  product-research:
    model: sonnet
  tech-research:
    model: sonnet
  specify:
    model: sonnet
  plan:
    model: sonnet
  analyze:
    model: sonnet
  clarify:
    model: sonnet
  checklist:
    model: sonnet
  tasks:
    model: sonnet
  implement:
    model: sonnet
  verify:
    model: sonnet

# Codex 运行时默认统一到 GPT-5.4，思考深度和 service tier 通过下方配置控制
model_compat:
  runtime: auto
  aliases:
    codex:
      opus: gpt-5.4
      sonnet: gpt-5.4
      haiku: gpt-5.4
    claude:
      gpt-5.3-codex: sonnet
      gpt-5.4: opus
      gpt-5: opus
      gpt-5-mini: sonnet
      o3: opus
      o4-mini: sonnet
  defaults:
    codex: gpt-5.4
    claude: sonnet

codex:
  service_tier: fast

codex_thinking:
  default_level: xhigh
  level_map:
    opus: xhigh
    sonnet: high
    haiku: medium

# ═══════════════════════════════════════
# 调研阶段配置（Feature 模式）
# ═══════════════════════════════════════
# 控制 Feature 模式中调研阶段的行为
# Story 模式和 Fix 模式不受此配置影响
#
# default_mode 可选值:
#   auto          — 由编排器根据需求特征智能推荐（默认）
#   full          — 完整调研（产品+技术+汇总），与当前版本行为一致
#   tech-only     — 仅技术调研（跳过产品调研和汇总）
#   product-only  — 仅产品调研（跳过技术调研和汇总）
#   codebase-scan — 代码库上下文扫描（与 Story 模式相同）
#   skip          — 跳过调研（不执行任何调研步骤）
#   custom        — 自定义步骤组合（需配置 custom_steps）
#
research:
  default_mode: auto

  # 自定义步骤（仅当 default_mode: custom 时生效）
  # 可选步骤: product-research, tech-research, codebase-scan, synthesis
  # 注意: synthesis 依赖 product-research 和 tech-research 的输出
  custom_steps: []

verification:
  commands: {}
  timeout: 300  # 验证命令超时（秒），默认 300；超过 3600 会触发警告
  monorepo:
    enabled: true

quality_gates:
  auto_continue_on_warning: true
  pause_on_critical: true

# 门禁策略: strict | balanced | autonomous
# 注：GATE_DESIGN 在 feature 模式下始终暂停（硬门禁），不受此配置影响
gate_policy: balanced

# 门禁级配置（高级，可选）
# 对每个门禁独立配置，优先于 gate_policy
# 可选值: always | auto | on_failure
# gates:
#   GATE_RESEARCH:
#     pause: auto
#   GATE_DESIGN:
#     pause: always
#   GATE_ANALYSIS:
#     pause: auto
#   GATE_TASKS:
#     pause: always
#   GATE_IMPLEMENT_MID:
#     pause: on_failure    # 实施中期门禁（>5 tasks 时在 50% 处触发）
#   GATE_VERIFY:
#     pause: always

retry:
  max_attempts: 2

progress:
  show_stage_progress: true
  show_stage_summary: true

# ═══════════════════════════════════════
# goal_loop 配置（Feature 201）
# ═══════════════════════════════════════
# 仅在 .specify/orchestration-overrides.yaml 为 feature mode implement phase
# 启用 agent_mode: goal_loop 时才被编排器读取。本仓库 dogfood：显式声明
# full_required_kinds 闭合 F204 实际敞口（裸搜该段而不声明 = 显式放弃该护栏）。
# 示例值与 config-schema.mjs 的 Zod default 一致。
goal_loop:
  max_iterations: 5          # 最大迭代轮数（FR-005），默认 5
  no_progress_max_rounds: 2  # 连续无进展轮数触发早停（FR-006），默认 2
  max_verify_seconds: 300    # 单轮 verify 墙钟上限（秒，FR-007，timeout 强制），默认 300
  max_tool_invocations: 50   # 单轮编排器可见调用数上限（FR-007，best-effort），默认 50
  # F204：full 轮必须出现这些 kind 类别的 PASS 命令才能 REACHED_GOAL；缺则 INCOMPLETE_FULL_VERIFY。
  # 默认 []（跳过校验）；本仓库 dogfood opt-in 设全四类，闭合 reward-hacking 敞口。
  # 注：本仓库 simple-yaml parser 只认 block-sequence（每行 - item），不认 inline flow ['a','b']。
  full_required_kinds:
    - build
    - test
    - lint
    - check
