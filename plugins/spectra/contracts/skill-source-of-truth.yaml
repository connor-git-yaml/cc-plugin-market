schemaVersion: 1
plugin:
  id: "spectra"
  sourceRoot: "plugins/spectra"
  metadataSource: "plugins/spectra/.claude-plugin/plugin.json"
  marketplaceManifest: ".claude-plugin/marketplace.json"

skills:
  canonicalRoot: "plugins/spectra/skills"
  generator:
    script: "plugins/spectra/scripts/sync-skill-mirrors.mjs"
    command: "npm run spectra:sync:skills"
  entries:
    - id: "spectra"
      source: "plugins/spectra/skills/spectra/SKILL.md"
      mirrors:
        - id: "published-compat"
          path: "src/skills-global/spectra/SKILL.md"
        - id: "repo-local-compat"
          path: "skills/spectra/SKILL.md"
    - id: "spectra-batch"
      source: "plugins/spectra/skills/spectra-batch/SKILL.md"
      mirrors:
        - id: "published-compat"
          path: "src/skills-global/spectra-batch/SKILL.md"
        - id: "repo-local-compat"
          path: "skills/spectra-batch/SKILL.md"
    - id: "spectra-diff"
      source: "plugins/spectra/skills/spectra-diff/SKILL.md"
      mirrors:
        - id: "published-compat"
          path: "src/skills-global/spectra-diff/SKILL.md"
        - id: "repo-local-compat"
          path: "skills/spectra-diff/SKILL.md"
