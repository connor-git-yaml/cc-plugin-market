      - id: "3"
        name: verify
        display_name: 验证与交付
        agent: verify
        agent_mode: single
        gates_before: null
        gates_after:
          - GATE_VERIFY
        conditional: null
        skip_if_exists: null
        is_critical: true

  # ─────────────────────────────────────────────────────────────
  # Resume 模式：中断恢复流程（4 阶段）
  # ─────────────────────────────────────────────────────────────
  resume:
    name: "Resume 模式（4 阶段中断恢复）"
    description: "恢复中断的实现流程，验证已有制品"
    phases:
      - id: "1"
        name: clarify
        display_name: 需求澄清（快速检查）
        agent: clarify
        agent_mode: single
        gates_before: null
        gates_after: null
        conditional: null
        skip_if_exists: null
        is_critical: false

      - id: "2"
        name: tasks
        display_name: 任务分解（更新）
        agent: tasks
        agent_mode: single
        gates_before: null
        gates_after:
          - GATE_TASKS
        conditional: null
        skip_if_exists: null
        is_critical: true

      - id: "3"
        name: implement
        display_name: 代码实现
        agent: implement
        agent_mode: single
        gates_before: null
        gates_after: null
        conditional: null
        skip_if_exists: null
        is_critical: true

      - id: "4"
        name: verify
