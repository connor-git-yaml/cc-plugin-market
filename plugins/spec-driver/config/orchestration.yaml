# ═══════════════════════════════════════════════════════════════
# Feature 093: refactor 模式（大规模重构流程，5 Phase）
# ═══════════════════════════════════════════════════════════════

  refactor:
    name: "Refactor 模式（5 阶段大规模重构）"
    description: "影响分析→分批规划→逐批实现+中间验证→残留扫描→最终验证"
