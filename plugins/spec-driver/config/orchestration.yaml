        is_critical: true

      # Phase 5: 最终验证
      - id: "5"
        name: final_verify
        display_name: 最终验证
        agent: verify
        agent_mode: single
        gates_before: null
        gates_after:
          - GATE_VERIFY
        conditional: null
        skip_if_exists: null
