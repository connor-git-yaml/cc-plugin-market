        gates_before: null
        gates_after: null
        conditional: null
        skip_if_exists: "spec.md"
        is_critical: false

      - id: "2"
        name: specify
        display_name: 需求规范
        agent: specify
        agent_mode: single
        gates_before: null
        gates_after:
          - GATE_DESIGN
        conditional: null
        skip_if_exists: "spec.md"
        is_critical: true

      - id: "3"
        name: plan
        display_name: 技术规划
        agent: plan
        agent_mode: single
        gates_before:
          - GATE_DESIGN
        gates_after: null
        conditional: null
        skip_if_exists: "plan.md"
        is_critical: true

      - id: "4"
        name: tasks
        display_name: 任务分解
        agent: tasks
        agent_mode: single
        gates_before: null
        gates_after:
          - GATE_TASKS
        conditional: null
        skip_if_exists: "tasks.md"
        is_critical: true

      - id: "5"
        name: implement
        display_name: 代码实现
        agent: implement
        agent_mode: single
        gates_before: null
        gates_after: null
        conditional: null
        skip_if_exists: null
        is_critical: true

      - id: "6"
        name: verify
        display_name: 验证与交付
        agent: verify
        agent_mode: single
        gates_before: null
        gates_after:
          - GATE_VERIFY
        conditional: null
        skip_if_exists: null
        is_critical: true

  # ─────────────────────────────────────────────────────────────
  # Implement 模式：代码实现专一流程（6 阶段）
  # ─────────────────────────────────────────────────────────────
  implement:
    name: "Implement 模式（6 阶段实现流程）"
    description: "基于已有规范和规划进行代码实现"
    phases:
      - id: "1"
        name: clarify
        display_name: 需求澄清（快速检查）
        agent: clarify
        agent_mode: single
        gates_before: null
        gates_after: null
        conditional: null
        skip_if_exists: "spec.md"
        is_critical: false

      - id: "2"
        name: plan
        display_name: 技术规划
        agent: plan
        agent_mode: single
        gates_before:
          - GATE_DESIGN
        gates_after: null
        conditional: null
        skip_if_exists: "plan.md"
        is_critical: true

      - id: "3"
        name: tasks
        display_name: 任务分解
        agent: tasks
        agent_mode: single
        gates_before: null
        gates_after: null
        conditional: null
        skip_if_exists: "tasks.md"
        is_critical: true

      - id: "4"
        name: analyze
        display_name: 一致性分析
        agent: analyze
        agent_mode: single
        gates_before: null
        gates_after:
          - GATE_ANALYSIS
          - GATE_TASKS
        conditional: null
        skip_if_exists: null
        is_critical: false

      - id: "5"
        name: implement
        display_name: 代码实现
        agent: implement
        agent_mode: single
        gates_before: null
        gates_after: null
        conditional: null
        skip_if_exists: null
        is_critical: true
        # 特殊：此 Phase 中期触发 GATE_IMPLEMENT_MID（insertion_point: after_task_50_percent）

      - id: "6"
        name: verify
        display_name: 验证与交付
        agent: verify
        agent_mode: single
        gates_before: null
        gates_after:
          - GATE_VERIFY
        conditional: null
        skip_if_exists: null
        is_critical: true

  # ─────────────────────────────────────────────────────────────
  # Fix 模式：修复流程（3 阶段最小化）
  # ─────────────────────────────────────────────────────────────
  fix:
    name: "Fix 模式（3 阶段修复流程）"
    description: "快速处理 bug 和小型修复"
    phases:
      - id: "1"
        name: specify
        display_name: 需求规范
        agent: specify
        agent_mode: single
        gates_before: null
        gates_after:
          - GATE_DESIGN
        conditional: null
        skip_if_exists: null
        is_critical: true

      - id: "2"
        name: implement
