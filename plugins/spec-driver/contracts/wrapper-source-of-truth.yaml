schemaVersion: 1
plugin:
  id: "spec-driver"
  sourceRoot: "plugins/spec-driver"
  metadataSource: "plugins/spec-driver/.claude-plugin/plugin.json"
  marketplaceManifest: ".claude-plugin/marketplace.json"

codexWrappers:
  sourceRoot: "plugins/spec-driver/skills"
  targetRoot: ".codex/skills"
  # Feature 213（A1）：随插件包分发的 tracked Codex 适配目录；与 targetRoot 共用同一份 entries id 列表。
  # copy-after-generate 保证与 .codex/skills 逐字节相同（含内嵌 Source SHA256 行）。
  pluginDistributionRoot: "plugins/spec-driver/skills-codex"
  generator:
    script: "plugins/spec-driver/scripts/codex-skills.sh"
    command: "npm run codex:spec-driver:install"
    # F186 T2：每个 wrapper header 内嵌 `- Source SHA256: <hash>`（source body 的 sha256，
    # 由 scripts/lib/extract-wrapper-body.mjs 计算，shell 生成端与 JS 校验端共用同一 helper）。
    # validate-wrapper-sources.mjs 重算比对：不匹配 / 缺 sha 行 → fail（防 source 漂移或 wrapper 被手改）。
  entries:
    - id: "spec-driver-constitution"
      source: "plugins/spec-driver/skills/spec-driver-constitution/SKILL.md"
      target: ".codex/skills/spec-driver-constitution/SKILL.md"
    - id: "spec-driver-feature"
      source: "plugins/spec-driver/skills/spec-driver-feature/SKILL.md"
      target: ".codex/skills/spec-driver-feature/SKILL.md"
    - id: "spec-driver-implement"
      source: "plugins/spec-driver/skills/spec-driver-implement/SKILL.md"
      target: ".codex/skills/spec-driver-implement/SKILL.md"
    - id: "spec-driver-story"
      source: "plugins/spec-driver/skills/spec-driver-story/SKILL.md"
      target: ".codex/skills/spec-driver-story/SKILL.md"
    - id: "spec-driver-fix"
      source: "plugins/spec-driver/skills/spec-driver-fix/SKILL.md"
      target: ".codex/skills/spec-driver-fix/SKILL.md"
    - id: "spec-driver-resume"
      source: "plugins/spec-driver/skills/spec-driver-resume/SKILL.md"
      target: ".codex/skills/spec-driver-resume/SKILL.md"
    - id: "spec-driver-sync"
      source: "plugins/spec-driver/skills/spec-driver-sync/SKILL.md"
      target: ".codex/skills/spec-driver-sync/SKILL.md"
    - id: "spec-driver-doc"
      source: "plugins/spec-driver/skills/spec-driver-doc/SKILL.md"
      target: ".codex/skills/spec-driver-doc/SKILL.md"

claudeProjectOverrides:
  classification: "project-override"
  root: ".claude/commands"
  note: "Kept for directory structure only. The 9 legacy atomic commands (spec-driver.{specify,plan,tasks,implement,clarify,analyze,checklist,constitution,taskstoissues}) were removed in v4.0, and the orchestrator skills no longer read .claude/commands/spec-driver.*.md as a prompt-source fallback. If such files still exist in a repository they will be ignored by the runtime. See docs/migrations/skill-deprecation.md."
  entries: []
