# ─────────────────────────────────────────────────────────────
# 示例三：并行调度资源限制（CI 环境串行执行）
# 场景：CI 资源受限，避免并行任务导致上下文超限或队列饥饿
# ─────────────────────────────────────────────────────────────

# version: "1.0"

# parallel_scheduling:
#   max_concurrent_tasks: 1  # 替换 base 的默认值（降为 1 = 串行执行）

# ─────────────────────────────────────────────────────────────
# 二期保留字段（MVP 不支持，出现时 strip + unsupported-field warning，不影响其余字段生效）
# ─────────────────────────────────────────────────────────────

