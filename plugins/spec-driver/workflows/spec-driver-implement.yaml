id: spec-driver-implement
title: "成熟 Spec 实施"
persona: "实施负责人"
useCases:
  - "已具备成熟 spec.md 与 plan.md"
  - "聚焦计划审查、任务细化、代码实施与验证"
entryCommand:
  claude: "/spec-driver:spec-driver-implement [<feature-dir-or-id>]"
  codex: "$spec-driver-implement [<feature-dir-or-id>]"
requiredInputs:
  - "specs/<feature>/spec.md"
  - "specs/<feature>/plan.md"
keyGates:
  - "GATE_TASKS"
  - "GATE_VERIFY"
artifacts:
  - "specs/<feature>/plan.md"
  - "specs/<feature>/tasks.md"
  - "specs/<feature>/verification/verification-report.md"
recommendedWhen:
  - "需求与设计已成熟，只需聚焦实施和验证"
  - "希望避免重复调研与重写 spec/plan"
templateVersion: "1.0.0"
