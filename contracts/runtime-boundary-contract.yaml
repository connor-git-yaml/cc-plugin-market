schemaVersion: 1
directories:
  codex:
    classification: "generated-distribution"
    description: "Codex 包装层；内容应由 source-of-truth 再生成，而不是直接手改。"
    generatedBy:
      command: "npm run codex:spec-driver:install"
      sourceContract: "plugins/spec-driver/contracts/wrapper-source-of-truth.yaml"
  claude:
    classification: "project-override"
    description: "Claude 仓库级项目配置与 override，允许项目内受控维护。"
    requiredFiles:
      - ".claude/settings.json"
      - ".claude/commands/spec-driver.implement.md"
    ignoredPaths:
      - ".claude/settings.local.json"
  specify:
    classification: "project-overlay-and-runtime"
    description: "Project Context、模板覆盖层与本地运行态。"
    requiredFiles:
      - ".specify/project-context.yaml"
      - ".specify/memory/constitution.md"
      - ".specify/templates/plan-template.md"
    advisoryFiles:
      - ".specify/project-context.suggestions.yaml"
      - ".specify/project-context.suggestions.md"
    ignoredPaths:
      - ".specify/.spec-driver-path"
      - ".specify/runs/"
    legacyPaths:
      - ".specify/project-context.md"
