name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npm run lint

      - name: Test
        run: npm test

      # 独立门禁：plugin mjs 测试。npm test 内部用 `vitest run && npm run test:plugins`，
      # 若 vitest 因仓库预存 dist-staleness flaky 失败会短路跳过 test:plugins，
      # 导致 162 个 mjs 测试在 CI 实际不跑。此步骤无论上一步成败都独立运行并报告，
      # 确保 plugin mjs 测试始终被 gate（Feature 201 Phase B 复审修正）。
      - name: Test Plugins (mjs gate)
        if: ${{ always() }}
        run: npm run test:plugins

